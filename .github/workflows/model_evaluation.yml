name: MLOps Model Evaluation Pipeline

on:
  # Ejecución programada diaria
  schedule:
    - cron: '0 6 * * *'  # Todos los días a las 6:00 AM UTC
  
  # Ejecución manual
  workflow_dispatch:
    inputs:
      model_path:
        description: 'Ruta del modelo (S3 o local)'
        required: true
        default: 's3://mi-bucket-clima/modelos/modelo_ski_latest.pkl'
      data_path:
        description: 'Ruta de los datos de evaluación'
        required: true
        default: 's3://mi-bucket-clima/datasets/evaluacion_diaria.csv'
      threshold:
        description: 'Umbral para reentrenamiento'
        required: false
        default: '2.0'
  
  # Trigger por push de nuevos datos
  repository_dispatch:
    types: [new-data-available]

env:
  PYTHON_VERSION: '3.11'
  AWS_REGION: 'us-east-1'

jobs:
  evaluate-model:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write  # Para OIDC authentication con AWS
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Alternativo: usar secrets para access keys
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: 🧪 Run model evaluation
        id: evaluation
        run: |
          # Configurar parámetros
          MODEL_PATH="${{ github.event.inputs.model_path || 's3://mi-bucket-clima/modelos/modelo_ski_latest.pkl' }}"
          DATA_PATH="${{ github.event.inputs.data_path || 's3://mi-bucket-clima/datasets/evaluacion_diaria.csv' }}"
          THRESHOLD="${{ github.event.inputs.threshold || '2.0' }}"
          
          # Crear nombre único para métricas
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          METRICS_S3="s3://mi-bucket-clima/metricas/metrics_${TIMESTAMP}.json"
          
          echo "🎯 Evaluando modelo..."
          echo "📁 Modelo: $MODEL_PATH"
          echo "📊 Datos: $DATA_PATH" 
          echo "🎚️ Umbral: $THRESHOLD"
          
          # Ejecutar evaluación
          python evaluate.py \
            --model_path "$MODEL_PATH" \
            --data_path "$DATA_PATH" \
            --target_col "temperature" \
            --primary_metric "mae" \
            --threshold "$THRESHOLD" \
            --metrics_local_path "metrics.json" \
            --metrics_s3_uri "$METRICS_S3" \
            --verbose > evaluation_output.txt 2>&1
          
          # Capturar exit code
          EVAL_EXIT_CODE=$?
          
          echo "evaluation_exit_code=$EVAL_EXIT_CODE" >> $GITHUB_OUTPUT
          echo "metrics_s3_path=$METRICS_S3" >> $GITHUB_OUTPUT
          
          # Mostrar salida
          cat evaluation_output.txt
          
          # Verificar si necesita reentrenamiento
          if [ $EVAL_EXIT_CODE -eq 1 ]; then
            echo "⚠️ REENTRENAMIENTO REQUERIDO"
            echo "should_retrain=true" >> $GITHUB_OUTPUT
          elif [ $EVAL_EXIT_CODE -eq 0 ]; then
            echo "✅ Modelo performance OK"
            echo "should_retrain=false" >> $GITHUB_OUTPUT
          else
            echo "❌ Error en evaluación"
            exit $EVAL_EXIT_CODE
          fi
      
      - name: 📊 Parse metrics
        id: parse_metrics
        if: always()
        run: |
          if [ -f "metrics.json" ]; then
            # Extraer métricas clave
            MAE=$(jq -r '.metrics.mae' metrics.json)
            RMSE=$(jq -r '.metrics.rmse' metrics.json)
            MAPE=$(jq -r '.metrics.mape' metrics.json)
            SAMPLES=$(jq -r '.metrics.n_samples' metrics.json)
            
            echo "mae=$MAE" >> $GITHUB_OUTPUT
            echo "rmse=$RMSE" >> $GITHUB_OUTPUT
            echo "mape=$MAPE" >> $GITHUB_OUTPUT
            echo "n_samples=$SAMPLES" >> $GITHUB_OUTPUT
            
            echo "📈 Métricas extraídas:"
            echo "   MAE: $MAE"
            echo "   RMSE: $RMSE" 
            echo "   MAPE: $MAPE%"
            echo "   Muestras: $SAMPLES"
          else
            echo "⚠️ Archivo metrics.json no encontrado"
          fi
      
      - name: 🚨 Trigger retraining pipeline
        if: steps.evaluation.outputs.should_retrain == 'true'
        run: |
          echo "🔄 Activando pipeline de reentrenamiento..."
          
          # Opción 1: Trigger otro workflow
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"retrain-model","client_payload":{"trigger_reason":"performance_degradation","metrics_path":"${{ steps.evaluation.outputs.metrics_s3_path }}"}}'
          
          # Opción 2: Webhook externo (descomentar si necesario)
          # curl -X POST \
          #   -H "Content-Type: application/json" \
          #   "${{ secrets.RETRAIN_WEBHOOK_URL }}" \
          #   -d '{"action":"retrain","reason":"performance_degradation","repository":"${{ github.repository }}"}'
      
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: evaluation-results-${{ github.run_number }}
          path: |
            metrics.json
            evaluation_output.txt
          retention-days: 30
      
      - name: 💬 Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const metrics = {
              mae: '${{ steps.parse_metrics.outputs.mae }}',
              rmse: '${{ steps.parse_metrics.outputs.rmse }}',
              mape: '${{ steps.parse_metrics.outputs.mape }}',
              samples: '${{ steps.parse_metrics.outputs.n_samples }}'
            };
            
            const shouldRetrain = '${{ steps.evaluation.outputs.should_retrain }}' === 'true';
            
            const comment = `
            ## 🌨️ Evaluación de Modelo Climático
            
            **Métricas de rendimiento:**
            - 📊 MAE: ${metrics.mae}
            - 📊 RMSE: ${metrics.rmse}
            - 📊 MAPE: ${metrics.mape}%
            - 📈 Muestras: ${metrics.samples}
            
            **Estado:** ${shouldRetrain ? '⚠️ **REENTRENAMIENTO REQUERIDO**' : '✅ Rendimiento OK'}
            
            ${shouldRetrain ? '🔄 Pipeline de reentrenamiento activado automáticamente.' : ''}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: 📊 Set job summary
        if: always()
        run: |
          echo "## 🌨️ Resumen Evaluación Modelo Climático" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Modelo:** ${{ github.event.inputs.model_path || 's3://mi-bucket-clima/modelos/modelo_ski_latest.pkl' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Datos:** ${{ github.event.inputs.data_path || 's3://mi-bucket-clima/datasets/evaluacion_diaria.csv' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.evaluation.outputs.should_retrain }}" == "true" ]; then
            echo "### ⚠️ REENTRENAMIENTO REQUERIDO" >> $GITHUB_STEP_SUMMARY
            echo "El modelo ha degradado su rendimiento y necesita reentrenamiento." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Modelo en buen estado" >> $GITHUB_STEP_SUMMARY
            echo "El rendimiento del modelo está dentro de los límites aceptables." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Métricas" >> $GITHUB_STEP_SUMMARY
          echo "- **MAE:** ${{ steps.parse_metrics.outputs.mae }}" >> $GITHUB_STEP_SUMMARY
          echo "- **RMSE:** ${{ steps.parse_metrics.outputs.rmse }}" >> $GITHUB_STEP_SUMMARY
          echo "- **MAPE:** ${{ steps.parse_metrics.outputs.mape }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Muestras:** ${{ steps.parse_metrics.outputs.n_samples }}" >> $GITHUB_STEP_SUMMARY

  notify-teams:
    needs: evaluate-model
    runs-on: ubuntu-latest
    if: always() && needs.evaluate-model.outputs.should_retrain == 'true'
    
    steps:
      - name: 📢 Notify Teams
        run: |
          # Webhook a Microsoft Teams (configurar en secrets)
          curl -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Modelo requiere reentrenamiento",
              "themeColor": "ff6b35",
              "sections": [{
                "activityTitle": "🚨 MLOps Alert - Centro de Ski",
                "activitySubtitle": "Modelo de predicción climática degradado",
                "facts": [
                  {"name": "Repositorio", "value": "${{ github.repository }}"},
                  {"name": "Workflow", "value": "${{ github.workflow }}"},
                  {"name": "MAE", "value": "${{ needs.evaluate-model.outputs.mae }}"},
                  {"name": "Umbral", "value": "${{ github.event.inputs.threshold || '2.0' }}"}
                ],
                "markdown": true
              }],
              "potentialAction": [{
                "@type": "OpenUri",
                "name": "Ver detalles",
                "targets": [{
                  "os": "default",
                  "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }]
              }]
            }'
